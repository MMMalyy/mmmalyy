<!-- Swiper Slider -->
<div class="swiper-container">
    <div class="swiper-wrapper">
        <!-- Replace with your portfolio items -->
        <div class="swiper-slide">Portfolio Item 1</div>
        <div class="swiper-slide">Portfolio Item 2</div>
        <div class="swiper-slide">Portfolio Item 3</div>
    </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
</div>

<!-- Add Swiper JS and CSS -->
<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    var mySwiper = new Swiper('.swiper-container', {
        // Optional parameters
        loop: true,
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
    });
</script>

<!-- CSS for cursor only on hover capable devices -->
<style>
    @media (hover: hover) {
        .custom-cursor {
            cursor: url('path/to/custom-cursor.cur'), auto;
        }
    }
    @media (hover: none) {
        .custom-cursor {
            cursor: auto;
        }
    }
</style>
